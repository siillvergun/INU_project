name: inu_project_benchmark

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: benchmark
      POSTGRES_USER: kuneun
      POSTGRES_PASSWORD: "1234"
    ports:
      - "5433:5432"
    volumes:
      - pgbench_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
      - ./workload:/workload:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kuneun -d benchmark"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgbench_data:
