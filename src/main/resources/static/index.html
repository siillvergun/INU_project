<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <title>Blog Project</title>
    <meta content="Blog Project" name="description"/>
    <style>
        :root {
          --bg: #0b0d10;
          --panel: #131722;
          --text: #e9eef6;
          --muted: #a9b4c4;
          --line: rgba(255,255,255,0.10);
          --accent: #7aa2ff;
          --accent2: #7dffb2;
          --radius: 14px;
          --shadow: 0 10px 30px rgba(0,0,0,0.35);
          --error: #ff6b6b;
          --success: #51cf66;
        }
        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
          margin: 0;
          font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
          background: radial-gradient(1200px 700px at 20% -10%, rgba(122,162,255,0.25), transparent 55%),
                      radial-gradient(900px 600px at 90% 10%, rgba(125,255,178,0.14), transparent 55%),
                      var(--bg);
          color: var(--text);
          line-height: 1.6;
        }
        a { color: inherit; text-decoration: none; }
        .wrap { max-width: 1120px; margin: 0 auto; padding: 20px; }

        /* Header */
        header {
          position: sticky;
          top: 0;
          z-index: 10;
          backdrop-filter: blur(10px);
          background: rgba(11,13,16,0.65);
          border-bottom: 1px solid var(--line);
        }
        .nav {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 16px;
          padding: 14px 20px;
          max-width: 1120px;
          margin: 0 auto;
        }
        .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; letter-spacing: 0.2px; }
        .logo {
          width: 34px; height: 34px; border-radius: 10px;
          background: linear-gradient(135deg, var(--accent), var(--accent2));
          box-shadow: 0 8px 20px rgba(122,162,255,0.25);
        }
        .navlinks { display: flex; align-items: center; gap: 14px; }
        .navlinks a, .navlinks button {
          padding: 8px 10px;
          border-radius: 10px;
          color: var(--muted);
          border: none;
          background: transparent;
          cursor: pointer;
          font-size: 14px;
        }
        .navlinks a:hover, .navlinks button:hover { background: rgba(255,255,255,0.06); color: var(--text); }
        .user-info {
          display: flex;
          align-items: center;
          gap: 10px;
          color: var(--muted);
          font-size: 14px;
        }

        /* Hero */
        .hero {
          margin-top: 18px;
          padding: 26px;
          border-radius: var(--radius);
          background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
          border: 1px solid var(--line);
          box-shadow: var(--shadow);
        }
        .hero h1 { margin: 0 0 8px; font-size: 28px; }
        .hero p { margin: 0; color: var(--muted); max-width: 70ch; }

        /* Layout */
        main {
          display: grid;
          grid-template-columns: minmax(0, 3fr) minmax(220px, 0.7fr);
          gap: 18px;
          margin-top: 18px;
          align-items: start;
        }
        @media (max-width: 920px) {
          main { grid-template-columns: 1fr; }
        }

        /* Cards */
        .card {
          border: 1px solid var(--line);
          border-radius: var(--radius);
          background: rgba(255,255,255,0.03);
          box-shadow: var(--shadow);
          overflow: hidden;
        }
        .card-header {
          padding: 16px 16px 12px;
          border-bottom: 1px solid var(--line);
          display: flex;
          align-items: baseline;
          justify-content: space-between;
          gap: 10px;
        }
        .card-header h2 { margin: 0; font-size: 16px; }
        .card-header span { color: var(--muted); font-size: 13px; }
        .card-body { padding: 14px 16px 16px; }

        /* Post list */
        .post {
          padding: 14px 0;
          border-bottom: 1px solid var(--line);
        }
        .post:last-child { border-bottom: 0; padding-bottom: 0; }
        .post-row {
          display: grid;
          grid-template-columns: minmax(0, 1fr) minmax(180px, 45%);
          gap: 16px;
          align-items: center;
          cursor: pointer;
        }
        .meta {
          display: flex;
          flex-wrap: wrap;
          gap: 8px 10px;
          color: var(--muted);
          font-size: 13px;
          margin-bottom: 6px;
          align-items: center;
        }
        .badge {
          font-size: 12px;
          padding: 2px 8px;
          border-radius: 999px;
          border: 1px solid var(--line);
          background: rgba(255,255,255,0.03);
          color: var(--muted);
        }
        .post h3 {
          margin: 0;
          font-size: 18px;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }
        .post-row:hover h3 { color: var(--accent); }
        .post-excerpt {
          color: var(--muted);
          font-size: 12px;
          overflow: hidden;
          text-align: right;
          text-overflow: ellipsis;
          white-space: nowrap;
        }
        .actions {
          display: flex;
          gap: 10px;
          align-items: center;
        }
        .btn {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          gap: 8px;
          padding: 9px 12px;
          border-radius: 12px;
          border: 1px solid var(--line);
          background: rgba(255,255,255,0.03);
          color: var(--text);
          font-size: 14px;
          cursor: pointer;
          user-select: none;
          transition: all 0.2s;
        }
        .btn:hover { background: rgba(255,255,255,0.06); }
        .btn.primary {
          border-color: rgba(122,162,255,0.45);
          background: rgba(122,162,255,0.12);
        }
        .btn.primary:hover {
          background: rgba(122,162,255,0.2);
        }
        .btn.like {
          border-color: rgba(255,107,107,0.45);
          background: rgba(255,107,107,0.12);
        }
        .btn.like:hover {
          background: rgba(255,107,107,0.2);
        }
        .btn.like.active {
          border-color: var(--error);
          background: rgba(255,107,107,0.25);
        }
        .btn.like.compact {
          border-radius: 999px;
          font-size: 12px;
          line-height: 1;
          padding: 4px 8px;
        }
        .btn.danger {
          border-color: rgba(255,107,107,0.45);
          background: rgba(255,107,107,0.12);
          color: var(--error);
        }
        .btn.danger:hover {
          background: rgba(255,107,107,0.2);
        }

        /* Forms */
        .form-group {
          margin-bottom: 16px;
        }
        .form-group label {
          display: block;
          margin-bottom: 6px;
          font-size: 14px;
          color: var(--muted);
        }
        .form-group input,
        .form-group textarea {
          width: 100%;
          padding: 10px 12px;
          border: 1px solid var(--line);
          border-radius: 10px;
          background: rgba(255,255,255,0.03);
          color: var(--text);
          font-size: 14px;
          font-family: inherit;
        }
        .form-group input:focus,
        .form-group textarea:focus {
          outline: none;
          border-color: var(--accent);
          background: rgba(255,255,255,0.05);
        }
        .form-group textarea {
          min-height: 120px;
          resize: vertical;
        }

        /* Modal */
        dialog {
          border: 1px solid var(--line);
          border-radius: 16px;
          background: #0f131c;
          color: var(--text);
          width: min(720px, calc(100% - 40px));
          max-height: 90vh;
          box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        dialog::backdrop { background: rgba(0,0,0,0.55); }
        .modal-head {
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 14px 16px;
          border-bottom: 1px solid var(--line);
        }
        .modal-head h3 { margin: 0; font-size: 16px; }
        .modal-body { 
          padding: 14px 16px 18px; 
          color: var(--muted);
          max-height: calc(90vh - 100px);
          overflow-y: auto;
        }
        .close {
          border: 1px solid var(--line);
          border-radius: 10px;
          padding: 6px 10px;
          background: rgba(255,255,255,0.03);
          color: var(--text);
          cursor: pointer;
        }

        /* Comments */
        .comments-section {
          margin-top: 20px;
          padding-top: 20px;
          border-top: 1px solid var(--line);
        }
        .comment {
          padding: 12px 0;
          border-bottom: 1px solid var(--line);
        }
        .comment:last-child { border-bottom: 0; }
        .comment-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 6px;
        }
        .comment-author {
          font-weight: 600;
          font-size: 14px;
          color: var(--text);
        }
        .comment-date {
          font-size: 12px;
          color: var(--muted);
        }
        .comment-content {
          color: var(--muted);
          font-size: 14px;
          margin-bottom: 8px;
        }
        .comment-actions {
          display: flex;
          gap: 8px;
        }
        .comment-form {
          margin-top: 16px;
        }

        /* Loading */
        .loading {
          text-align: center;
          padding: 40px;
          color: var(--muted);
        }
        .spinner {
          display: inline-block;
          width: 20px;
          height: 20px;
          border: 2px solid var(--line);
          border-top-color: var(--accent);
          border-radius: 50%;
          animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }

        /* Error/Success messages */
        .message {
          padding: 12px 16px;
          border-radius: 10px;
          margin-bottom: 16px;
          font-size: 14px;
        }
        .message.error {
          background: rgba(255,107,107,0.15);
          border: 1px solid rgba(255,107,107,0.3);
          color: var(--error);
        }
        .message.success {
          background: rgba(81,207,102,0.15);
          border: 1px solid rgba(81,207,102,0.3);
          color: var(--success);
        }

        /* Empty state */
        .empty {
          text-align: center;
          padding: 40px;
          color: var(--muted);
        }
        @media (max-width: 640px) {
          .post-row {
            grid-template-columns: 1fr;
            gap: 4px;
          }
          .post-excerpt {
            text-align: left;
          }
        }
    </style>
</head>
<body>
<header>
    <div class="nav">
        <div class="brand">
            <div aria-hidden="true" class="logo"></div>
            <div>Blog Project</div>
        </div>

        <nav aria-label="메인 메뉴" class="navlinks">
            <a href="#" onclick="showAllPosts(); return false;">전체 글 목록</a>
            <a href="#" onclick="showMyPosts(); return false;">내 글 목록</a>
            <button id="createPostBtn" onclick="openCreatePostModal()">글 작성</button>
            <div class="user-info" id="userSection">
                <button id="loginBtn" onclick="openLoginModal()">로그인</button>
                <button id="registerBtn" onclick="openRegisterModal()">회원가입</button>
            </div>
        </nav>
    </div>
</header>

<div class="wrap">
    <section class="hero">
        <h1>Blog Project</h1>
    </section>

    <main>
        <!-- Posts -->
        <section aria-label="글 목록" class="card" id="posts">
            <div class="card-header">
                <h2>최근 글</h2>
                <span id="resultCount">0 posts</span>
            </div>
            <div class="card-body" id="postList">
                <div class="loading">
                    <div class="spinner"></div>
                    <div style="margin-top: 10px;">글을 불러오는 중...</div>
                </div>
            </div>
        </section>

        <!-- Sidebar -->
        <aside aria-label="사이드바" class="card">
            <div class="card-header">
                <h2>정보</h2>
                <span>Info</span>
            </div>
            <div class="card-body">
                <div style="color: var(--muted); font-size: 14px; line-height: 1.8;">
                    <p><strong>사용 방법:</strong></p>
                    <ol style="margin: 10px 0; padding-left: 20px;">
                        <li>회원가입을 진행하세요</li>
                        <li>로그인하면 글을 작성할 수 있습니다</li>
                        <li>글을 클릭하면 상세 내용과 댓글을 볼 수 있습니다</li>
                        <li>좋아요 버튼으로 글과 댓글에 반응하세요</li>
                    </ol>
                </div>
            </div>
        </aside>
    </main>

    <div class="footer" style="margin: 22px 0 8px; color: var(--muted); font-size: 13px; text-align: center;">
        © <span id="year"></span> Blog Project. All rights reserved.
    </div>
</div>

<!-- Post Detail Modal -->
<dialog id="postModal">
    <div class="modal-head">
        <h3 id="postModalTitle">제목</h3>
        <button aria-label="닫기" class="close" onclick="closePostModal()">닫기</button>
    </div>
    <div class="modal-body" id="postModalBody">
        <div id="postContent"></div>
        <div class="comments-section" id="commentsSection">
            <h4 style="margin: 0 0 16px; font-size: 16px;">댓글</h4>
            <div id="commentsList"></div>
            <div class="comment-form">
                <div class="form-group">
                    <textarea id="commentInput" placeholder="댓글을 입력하세요..." rows="3"></textarea>
                </div>
                <button class="btn primary" id="submitCommentBtn" type="button">댓글 작성</button>
            </div>
        </div>
    </div>
</dialog>

<!-- Create Post Modal -->
<dialog id="createPostModal">
    <div class="modal-head">
        <h3>새 글 작성</h3>
        <button aria-label="닫기" class="close" onclick="closeCreatePostModal()">닫기</button>
    </div>
    <div class="modal-body">
        <div id="createPostMessage"></div>
        <div class="form-group">
            <label for="postTitle">제목</label>
            <input id="postTitle" placeholder="글 제목을 입력하세요" type="text">
        </div>
        <div class="form-group">
            <label for="postContentInput">내용</label>
            <textarea id="postContentInput" placeholder="글 내용을 입력하세요" rows="8"></textarea>
        </div>
        <button class="btn primary" onclick="submitPost()">작성하기</button>
    </div>
</dialog>

<!-- Register Modal -->
<dialog id="registerModal">
    <div class="modal-head">
        <h3>회원가입</h3>
        <button aria-label="닫기" class="close" onclick="closeRegisterModal()">닫기</button>
    </div>
    <div class="modal-body">
        <div id="registerMessage"></div>
        <div class="form-group">
            <label for="registerEmail">이메일</label>
            <input id="registerEmail" placeholder="이메일을 입력하세요" type="email">
        </div>
        <div class="form-group">
            <label for="registerNickname">닉네임</label>
            <input id="registerNickname" placeholder="닉네임을 입력하세요" type="text">
        </div>
        <div class="form-group">
            <label for="registerPassword">비밀번호</label>
            <input id="registerPassword" placeholder="비밀번호를 입력하세요" type="password">
        </div>
        <button class="btn primary" onclick="submitRegister()">회원가입</button>
    </div>
</dialog>

<!-- Login Modal -->
<dialog id="loginModal">
    <div class="modal-head">
        <h3>로그인</h3>
        <button aria-label="닫기" class="close" onclick="closeLoginModal()">닫기</button>
    </div>
    <div class="modal-body">
        <div id="loginMessage"></div>
        <div class="form-group">
            <label for="loginEmail">이메일</label>
            <input id="loginEmail" placeholder="이메일을 입력하세요" type="email">
        </div>
        <div class="form-group">
            <label for="loginPassword">비밀번호</label>
            <input id="loginPassword" placeholder="비밀번호를 입력하세요" type="password">
        </div>
        <button class="btn primary" onclick="submitLogin()">로그인</button>
    </div>
</dialog>

<script>
    const API_BASE_URL = '';
    let currentUser = null;
    let currentPostId = null;
    let currentPostTitle = null;
    let allPosts = [];
    let allComments = [];

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('year').textContent = new Date().getFullYear();
        loadUser();
        loadPosts();
        loadComments();
        
        // 댓글 작성 버튼 이벤트 리스너
        const submitCommentBtn = document.getElementById('submitCommentBtn');
        if (submitCommentBtn) {
            submitCommentBtn.addEventListener('click', createComment);
        }
        
        // 댓글 입력 필드에서 Enter 키 지원 (Shift+Enter는 줄바꿈)
        const commentInput = document.getElementById('commentInput');
        if (commentInput) {
            commentInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    createComment();
                }
            });
        }
    });

    // User Management
    function loadUser() {
        const token = localStorage.getItem('accessToken');
        const userNickname = localStorage.getItem('userNickname');
        const userId = localStorage.getItem('userId');
        if (token && userNickname && userId) {
            currentUser = { userId: parseInt(userId), nickname: userNickname, token };
            updateUserUI();
        }
    }

    function updateUserUI() {
        const userSection = document.getElementById('userSection');
        if (currentUser) {
            userSection.innerHTML = `
                <span>${currentUser.nickname}</span>
                <button onclick="logout()">로그아웃</button>
            `;
            document.getElementById('createPostBtn').style.display = 'inline-flex';
        } else {
            userSection.innerHTML = `
                <span>로그인 필요</span>
                <button onclick="openLoginModal()">로그인</button>
                <button onclick="openRegisterModal()">회원가입</button>
            `;
            document.getElementById('createPostBtn').style.display = 'none';
        }
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem('accessToken');
        localStorage.removeItem('userId');
        localStorage.removeItem('userNickname');
        updateUserUI();
        showMessage('로그아웃되었습니다.', 'success');
    }

    // Register
    function openRegisterModal() {
        document.getElementById('registerModal').showModal();
        document.getElementById('registerMessage').innerHTML = '';
    }

    function closeRegisterModal() {
        document.getElementById('registerModal').close();
        document.getElementById('registerEmail').value = '';
        document.getElementById('registerNickname').value = '';
        document.getElementById('registerPassword').value = '';
    }

    async function submitRegister() {
        const email = document.getElementById('registerEmail').value;
        const nickname = document.getElementById('registerNickname').value;
        const password = document.getElementById('registerPassword').value;

        if (!email || !nickname || !password) {
            showMessageInElement('registerMessage', '모든 필드를 입력해주세요.', 'error');
            return;
        }

        try {
            const response = await fetch(`${API_BASE_URL}/users/join`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, nickname, password })
            });

            if (response.ok) {
                // 회원가입 후 자동 로그인
                const loginResponse = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const { accessToken } = await loginResponse.json();
                const meResponse = await fetch(`${API_BASE_URL}/users/me`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const user = await meResponse.json();
                currentUser = { userId: user.userId, nickname: user.nickname, token: accessToken };
                localStorage.setItem('accessToken', accessToken);
                localStorage.setItem('userId', user.userId);
                localStorage.setItem('userNickname', user.nickname);
                updateUserUI();
                closeRegisterModal();
                showMessage('회원가입이 완료되었습니다!', 'success');
            } else {
                const error = await response.text();
                showMessageInElement('registerMessage', '회원가입 실패: ' + error, 'error');
            }
        } catch (error) {
            showMessageInElement('registerMessage', '오류: ' + error.message, 'error');
        }
    }

    // Login
    function openLoginModal() {
        document.getElementById('loginModal').showModal();
        document.getElementById('loginMessage').innerHTML = '';
    }

    function closeLoginModal() {
        document.getElementById('loginModal').close();
        document.getElementById('loginEmail').value = '';
        document.getElementById('loginPassword').value = '';
    }

    async function submitLogin() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;

        if (!email || !password) {
            showMessageInElement('loginMessage', '이메일과 비밀번호를 입력해주세요.', 'error');
            return;
        }

        try {
            const response = await fetch(`${API_BASE_URL}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (response.ok) {
                const { accessToken } = await response.json();
                // 토큰으로 내 정보 가져오기
                const meResponse = await fetch(`${API_BASE_URL}/users/me`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const user = await meResponse.json();
                currentUser = { userId: user.userId, nickname: user.nickname, token: accessToken };
                localStorage.setItem('accessToken', accessToken);
                localStorage.setItem('userId', user.userId);
                localStorage.setItem('userNickname', user.nickname);
                updateUserUI();
                closeLoginModal();
                showMessage('로그인되었습니다!', 'success');
            } else {
                showMessageInElement('loginMessage', '이메일 또는 비밀번호가 올바르지 않습니다.', 'error');
            }
        } catch (error) {
            showMessageInElement('loginMessage', '오류: ' + error.message, 'error');
        }
    }

    // Posts
    async function loadPosts() {
        try {
            const response = await fetch(`${API_BASE_URL}/posts`);
            if (response.ok) {
                allPosts = await response.json();
                renderPosts();
            } else {
                showMessage('글을 불러올 수 없습니다.', 'error');
                document.getElementById('postList').innerHTML = '<div class="empty">글을 불러올 수 없습니다.</div>';
            }
        } catch (error) {
            showMessage('오류: ' + error.message, 'error');
            document.getElementById('postList').innerHTML = '<div class="empty">글을 불러올 수 없습니다.</div>';
        }
    }

    function renderPosts() {
        const postList = document.getElementById('postList');
        const resultCount = document.getElementById('resultCount');

        if (allPosts.length === 0) {
            postList.innerHTML = '<div class="empty">아직 작성된 글이 없습니다.</div>';
            resultCount.textContent = '0 posts';
            return;
        }

        resultCount.textContent = `${allPosts.length} post${allPosts.length === 1 ? '' : 's'}`;

        postList.innerHTML = allPosts.map(post => {
            const date = new Date(post.createdAt).toLocaleDateString('ko-KR');
            return `
                <article class="post" data-post-id="${post.postId}">
                    <div class="meta">
                        <span class="badge">${post.authorNickname}</span>
                        <span>${date}</span>
                        <span>·</span>
                        <span>❤️ ${post.likeCount || 0}</span>
                        ${currentUser ? `<button class="btn like compact" onclick="event.stopPropagation(); togglePostLike(${post.postId})">좋아요</button>` : ''}
                    </div>
                    <div class="post-row" onclick="openPostDetail(${post.postId})">
                        <h3>${escapeHtml(post.title)}</h3>
                        <div class="post-excerpt">${escapeHtml(post.content || '')}</div>
                    </div>
                </article>
            `;
        }).join('');
    }

    // 전체 글 목록 보기
    function showAllPosts() {
        loadPosts();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 내 글 목록 보기
    async function showMyPosts() {
        if (!currentUser) {
            showMessage('로그인이 필요합니다.', 'error');
            openLoginModal();
            return;
        }
        
        try {
            const response = await fetch(`${API_BASE_URL}/posts/me/user`, {
                headers: { 'Authorization': `Bearer ${currentUser.token}` }
            });
            if (response.ok) {
                allPosts = await response.json();
                renderPosts();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                showMessage('글을 불러올 수 없습니다.', 'error');
                document.getElementById('postList').innerHTML = '<div class="empty">글을 불러올 수 없습니다.</div>';
            }
        } catch (error) {
            showMessage('오류: ' + error.message, 'error');
            document.getElementById('postList').innerHTML = '<div class="empty">글을 불러올 수 없습니다.</div>';
        }
    }

    // Create Post
    function openCreatePostModal() {
        if (!currentUser) {
            showMessage('로그인이 필요합니다.', 'error');
            openLoginModal();
            return;
        }
        document.getElementById('createPostModal').showModal();
        document.getElementById('createPostMessage').innerHTML = '';
    }

    function closeCreatePostModal() {
        document.getElementById('createPostModal').close();
        document.getElementById('postTitle').value = '';
        document.getElementById('postContentInput').value = '';
    }

    async function submitPost() {
        if (!currentUser) {
            showMessage('로그인이 필요합니다.', 'error');
            return;
        }

        const title = document.getElementById('postTitle').value;
        const content = document.getElementById('postContentInput').value;

        if (!title || !content) {
            showMessageInElement('createPostMessage', '제목과 내용을 모두 입력해주세요.', 'error');
            return;
        }

        try {
            const response = await fetch(`${API_BASE_URL}/posts/me`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${currentUser.token}` },
                body: JSON.stringify({ title, content })
            });

            if (response.ok) {
                closeCreatePostModal();
                loadPosts();
                showMessage('글이 작성되었습니다!', 'success');
            } else {
                const error = await response.text();
                showMessageInElement('createPostMessage', '작성 실패: ' + error, 'error');
            }
        } catch (error) {
            showMessageInElement('createPostMessage', '오류: ' + error.message, 'error');
        }
    }

    // Post Detail
    async function openPostDetail(postId) {
        currentPostId = postId;
        const post = allPosts.find(p => p.postId === postId);
        if (!post) return;
        currentPostTitle = post.title;

        document.getElementById('postModalTitle').textContent = post.title;
        document.getElementById('postContent').innerHTML = `
            <div style="margin-bottom: 20px;">
                <div class="meta" style="margin-bottom: 16px;">
                    <span class="badge">${post.authorNickname}</span>
                    <span>${new Date(post.createdAt).toLocaleString('ko-KR')}</span>
                    <span>·</span>
                    <span>❤️ ${post.likeCount || 0}</span>
                </div>
                <div style="white-space: pre-wrap; line-height: 1.8;">${escapeHtml(post.content)}</div>
                <div style="display: flex; gap: 10px; margin-top: 16px;">
                    ${currentUser ? `<button class="btn like" onclick="togglePostLike(${post.postId}); loadPostDetail(${post.postId})">❤️ 좋아요</button>` : ''}
                    ${currentUser && post.authorNickname === currentUser.nickname ? `<button class="btn danger" onclick="deletePost(${post.postId})">🗑️ 삭제</button>` : ''}
                </div>
            </div>
        `;

        loadPostComments(postId);
        const modal = document.getElementById('postModal');
        modal.showModal();
        
        // 모달이 열린 후 댓글 입력 필드에 포커스
        setTimeout(() => {
            const commentInput = document.getElementById('commentInput');
            if (commentInput) {
                commentInput.focus();
            }
        }, 100);
    }

    function closePostModal() {
        document.getElementById('postModal').close();
        currentPostId = null;
        currentPostTitle = null;
    }

    // Comments
    async function loadComments() {
        try {
            const response = await fetch(`${API_BASE_URL}/comments`);
            if (response.ok) {
                allComments = await response.json();
            }
        } catch (error) {
            console.error('Failed to load comments:', error);
        }
    }

    async function loadPostComments(postId) {
        const commentsList = document.getElementById('commentsList');
        const post = allPosts.find(p => p.postId === postId);
        if (!post) {
            console.warn('Post not found:', postId);
            commentsList.innerHTML = '<div class="empty">게시글을 찾을 수 없습니다.</div>';
            return;
        }

        // 댓글 목록이 아직 로드되지 않았다면 먼저 로드
        if (!allComments || allComments.length === 0) {
            await loadComments();
        }

        // 제목으로 댓글 필터링 (정확한 일치)
        const postComments = allComments.filter(c => {
            const match = c.title && post.title && c.title.trim() === post.title.trim();
            return match;
        });

        if (postComments.length === 0) {
            commentsList.innerHTML = '<div class="empty">아직 댓글이 없습니다.</div>';
            return;
        }

        commentsList.innerHTML = postComments.map(comment => {
            const date = new Date(comment.createdAt).toLocaleString('ko-KR');
            const isMyComment = currentUser && comment.authorNickname === currentUser.nickname;
            return `
                <div class="comment">
                    <div class="comment-header">
                        <span class="comment-author">${escapeHtml(comment.authorNickname)}</span>
                        <span class="comment-date">${date}</span>
                    </div>
                    <div class="comment-content">${escapeHtml(comment.content)}</div>
                    <div class="comment-actions">
                        ${currentUser ? `<button class="btn like" onclick="toggleCommentLike(${comment.commentId}); loadPostComments(${postId})" style="font-size: 12px; padding: 6px 10px;">❤️ ${comment.likeCount || 0}</button>` : `<span style="font-size: 12px; color: var(--muted);">❤️ ${comment.likeCount || 0}</span>`}
                        ${isMyComment ? `<button class="btn danger" onclick="deleteComment(${comment.commentId}, ${postId})" style="font-size: 12px; padding: 6px 10px;">🗑️ 삭제</button>` : ''}
                    </div>
                </div>
            `;
        }).join('');
    }

    async function createComment() {
        if (!currentUser) {
            showMessage('로그인이 필요합니다.', 'error');
            return;
        }

        if (!currentPostId) {
            showMessage('게시글 정보를 찾을 수 없습니다.', 'error');
            return;
        }

        const content = document.getElementById('commentInput').value;
        if (!content || !content.trim()) {
            showMessage('댓글 내용을 입력해주세요.', 'error');
            return;
        }

        const url = `${API_BASE_URL}/comments/me/${currentPostId}`;
        const requestBody = { content: content.trim() };

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${currentUser.token}`
                },
                body: JSON.stringify(requestBody)
            });

            if (response.ok) {
                const commentData = await response.json();
                
                document.getElementById('commentInput').value = '';
                
                // 댓글 목록을 다시 불러온 후 화면 업데이트
                await loadComments();
                await loadPostComments(currentPostId);
                
                showMessage('댓글이 작성되었습니다!', 'success');
            } else {
                let errorText;
                try {
                    errorText = await response.text();
                } catch (e) {
                    errorText = `HTTP ${response.status}: ${response.statusText}`;
                }
                showMessage('댓글 작성 실패: ' + errorText, 'error');
            }
        } catch (error) {
            showMessage('오류: ' + error.message, 'error');
        }
    }

    // Like
    async function togglePostLike(postId) {
        if (!currentUser) {
            showMessage('로그인이 필요합니다.', 'error');
            return;
        }

        try {
            const response = await fetch(`${API_BASE_URL}/posts/me/${postId}/like`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${currentUser.token}` }
            });

            if (response.ok) {
                await loadPosts();
                if (currentPostId === postId) {
                    loadPostDetail(postId);
                }
            }
        } catch (error) {
            console.error('Failed to toggle like:', error);
        }
    }

    async function toggleCommentLike(commentId) {
        if (!currentUser) {
            showMessage('로그인이 필요합니다.', 'error');
            return;
        }

        try {
            const response = await fetch(`${API_BASE_URL}/comments/me/${commentId}/like`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${currentUser.token}` }
            });

            if (response.ok) {
                await loadComments();
                if (currentPostId) {
                    loadPostComments(currentPostId);
                }
            }
        } catch (error) {
            console.error('Failed to toggle comment like:', error);
        }
    }

    async function loadPostDetail(postId) {
        await loadPosts();
        openPostDetail(postId);
    }

    // Delete Post
    async function deletePost(postId) {
        if (!currentUser) {
            showMessage('로그인이 필요합니다.', 'error');
            return;
        }

        if (!confirm('정말 이 게시글을 삭제하시겠습니까?')) {
            return;
        }

        try {
            const response = await fetch(`${API_BASE_URL}/posts/me/${postId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${currentUser.token}` }
            });

            if (response.ok || response.status === 204) {
                showMessage('게시글이 삭제되었습니다.', 'success');
                closePostModal();
                await showMyPosts(); // 내 글 목록 새로고침
            } else {
                const errorText = await response.text();
                showMessage('게시글 삭제 실패: ' + errorText, 'error');
            }
        } catch (error) {
            console.error('Failed to delete post:', error);
            showMessage('오류: ' + error.message, 'error');
        }
    }

    // Delete Comment
    async function deleteComment(commentId, postId) {
        if (!currentUser) {
            showMessage('로그인이 필요합니다.', 'error');
            return;
        }

        if (!confirm('정말 이 댓글을 삭제하시겠습니까?')) {
            return;
        }

        try {
            const response = await fetch(`${API_BASE_URL}/comments/me/${commentId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${currentUser.token}` }
            });

            if (response.ok || response.status === 204) {
                showMessage('댓글이 삭제되었습니다.', 'success');
                await loadComments();
                await loadPostComments(postId);
            } else {
                const errorText = await response.text();
                showMessage('댓글 삭제 실패: ' + errorText, 'error');
            }
        } catch (error) {
            console.error('Failed to delete comment:', error);
            showMessage('오류: ' + error.message, 'error');
        }
    }

    // Utility
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function showMessage(message, type) {
        if (type === 'error') {
            alert(message);
            return;
        }
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${type}`;
        messageDiv.textContent = message;
        document.querySelector('.wrap').insertBefore(messageDiv, document.querySelector('.hero'));
        setTimeout(() => messageDiv.remove(), 5000);
    }

    function showMessageInElement(elementId, message, type) {
        if (type === 'error') {
            alert(message);
            return;
        }
        const element = document.getElementById(elementId);
        element.innerHTML = '';
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${type}`;
        messageDiv.textContent = message;
        element.appendChild(messageDiv);
    }

    // Modal close on backdrop click
    document.getElementById('postModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('postModal')) {
            closePostModal();
        }
    });

    document.getElementById('createPostModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('createPostModal')) {
            closeCreatePostModal();
        }
    });

    document.getElementById('registerModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('registerModal')) {
            closeRegisterModal();
        }
    });

    document.getElementById('loginModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('loginModal')) {
            closeLoginModal();
        }
    });
</script>
</body>
</html>
